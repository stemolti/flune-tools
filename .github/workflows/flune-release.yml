name: flune — Release

on:
  push:
    branches: [main]
    paths: ['flune/**']
  # Manual trigger to (re)publish the current flune/ version — used to recover
  # when a version was bumped + tagged but the publish step failed.
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    defaults:
      run:
        working-directory: flune
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: flune/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      # Build and test BEFORE bumping, so a red build never leaves a version
      # bump commit behind without a matching npm release.
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Bump + tag only on push. A manual dispatch republishes the current
      # version as-is (it was already bumped + tagged by the failed run).
      - name: Bump version and tag
        if: github.event_name == 'push'
        run: |
          # Skip if last commit is already a release commit
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -q '^chore(release): flune/v'; then
            echo "Last commit is a release commit, skipping bump"
            exit 0
          fi

          # Determine bump type from the triggering commit
          COMMITS=$(git log -1 --pretty=format:"%s%n%b")
          BUMP="patch"

          if echo "$COMMITS" | grep -qiE '^feat!:|^[a-z]+\(.*\)!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(|:)'; then
            BUMP="minor"
          fi

          # Bump package.json + package-lock.json (source of truth: package.json)
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version | sed 's/^v//')
          echo "Bumping $BUMP -> $NEW_VERSION"

          # Commit, push, and tag
          git add package.json package-lock.json
          git commit -m "chore(release): flune/v${NEW_VERSION}"
          git push
          git tag "flune/v${NEW_VERSION}"
          git push origin "flune/v${NEW_VERSION}"

      # Idempotent publish: only publishes if the current version is not already
      # on npm, so re-runs and manual dispatches are safe.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "flune@${VERSION}" version >/dev/null 2>&1; then
            echo "flune@${VERSION} is already published, skipping"
          else
            echo "Publishing flune@${VERSION}"
            npm publish --provenance --access public
          fi
