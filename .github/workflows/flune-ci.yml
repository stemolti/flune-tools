name: flune — CI

on:
  push:
    branches: [main]
    paths: ['flune/**']
  pull_request:
    paths: ['flune/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flune
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: flune/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
