name: flune — Release

on:
  push:
    branches: [main]
    paths: ['flune/**']

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    defaults:
      run:
        working-directory: flune
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: flune/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      # Build and test BEFORE bumping, so a red build never leaves a version
      # bump commit behind without a matching npm release.
      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, tag, and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Skip if last commit is already a release commit
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -q '^chore(release): flune/v'; then
            echo "Last commit is a release commit, skipping"
            exit 0
          fi

          # Determine bump type from the triggering commit
          COMMITS=$(git log -1 --pretty=format:"%s%n%b")
          BUMP="patch"

          if echo "$COMMITS" | grep -qiE '^feat!:|^[a-z]+\(.*\)!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(|:)'; then
            BUMP="minor"
          fi

          # Bump package.json + package-lock.json (source of truth: package.json)
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version | sed 's/^v//')
          echo "Bumping $BUMP -> $NEW_VERSION"

          # Commit, push, and tag
          git add package.json package-lock.json
          git commit -m "chore(release): flune/v${NEW_VERSION}"
          git push
          git tag "flune/v${NEW_VERSION}"
          git push origin "flune/v${NEW_VERSION}"

          # Publish to npm with provenance attestation
          npm publish --provenance --access public
